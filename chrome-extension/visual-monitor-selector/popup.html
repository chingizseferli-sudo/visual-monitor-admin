<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8" />
    <title>Visual Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --vm-bg: #f8fafc;
        --vm-card: #ffffff;
        --vm-border: #dbe3ef;
        --vm-text: #0f172a;
        --vm-muted: #64748b;
        --vm-blue: #0ea5e9;
        --vm-blue-soft: #eff6ff;
        --vm-green: #059669;
        --vm-green-soft: #ecfdf5;
        --vm-red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 390px;
        font: 14px Arial, sans-serif;
        color: var(--vm-text);
        background: var(--vm-bg);
      }
      .wrap { padding: 14px; display: grid; gap: 12px; }
      .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
      .title-block { display: grid; gap: 2px; min-width: 0; }
      h1 { font-size: 17px; margin: 0; letter-spacing: 0; }
      .subtitle { margin: 0; font-size: 12px; color: var(--vm-muted); }
      .top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      .count {
        min-width: 28px;
        text-align: center;
        border-radius: 999px;
        background: #fee2e2;
        color: #b91c1c;
        padding: 5px 8px;
        font-weight: 800;
        box-shadow: inset 0 0 0 1px #fecaca;
      }
      button {
        border: 1px solid var(--vm-border);
        border-radius: 8px;
        background: var(--vm-card);
        color: var(--vm-text);
        cursor: pointer;
        padding: 8px 10px;
        font-weight: 700;
        transition: background .15s ease, border-color .15s ease, transform .15s ease;
      }
      button:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
      button:active:not(:disabled) { transform: translateY(1px); }
      button.primary { background: #0f172a; color: white; border-color: #0f172a; width: 100%; }
      button.primary:hover:not(:disabled) { background: #1e293b; }
      button.small { padding: 6px 9px; font-size: 12px; font-weight: 700; white-space: nowrap; }
      button.link-button { color: #0369a1; background: #f0f9ff; border-color: #bae6fd; }
      button.read-button { color: #047857; background: var(--vm-green-soft); border-color: #bbf7d0; }
      button:disabled { opacity: .55; cursor: not-allowed; }
      .list { display: grid; gap: 9px; max-height: 430px; overflow: auto; padding-right: 2px; }
      .item {
        position: relative;
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        gap: 10px;
        border: 1px solid var(--vm-border);
        border-left: 4px solid var(--vm-blue);
        border-radius: 10px;
        background: var(--vm-card);
        padding: 11px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, .06);
      }
      .item.unread { background: linear-gradient(90deg, var(--vm-blue-soft), #ffffff 36%); }
      .icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        background: #e0f2fe;
        color: #0369a1;
        font-weight: 800;
        border: 1px solid #bae6fd;
        overflow: hidden;
      }
      .content { display: grid; gap: 5px; min-width: 0; }
      .name-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
      .name { font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pill { border-radius: 999px; background: var(--vm-green-soft); color: #047857; padding: 2px 7px; font-size: 11px; font-weight: 800; }
      .meta { font-size: 12px; color: var(--vm-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .summary {
        font-size: 13px;
        color: #1e293b;
        font-weight: 700;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .link { color: #0369a1; }
      .actions { display: flex; gap: 8px; padding-top: 3px; }
      .actions button { flex: 1; padding: 7px 9px; }
      .empty {
        border: 1px dashed #cbd5e1;
        border-radius: 10px;
        padding: 22px 16px;
        text-align: center;
        color: var(--vm-muted);
        background: var(--vm-card);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title-block">
          <h1>Dəyişikliklər</h1>
          <p class="subtitle">Oxunmamış izləmə bildirişləri</p>
        </div>
        <div class="top-actions">
          <button id="markAllRead" class="small" type="button" disabled>Hamısını oxundu et</button>
          <span id="count" class="count">0</span>
        </div>
      </div>
      <button id="startSelector" class="primary" type="button">Bu səhifədə selector seç</button>
      <div id="list" class="list"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
